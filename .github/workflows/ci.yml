name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build library
        run: npm run build:lib

      - name: Build demo app
        run: npx ng build

      - name: Setup Chrome and ChromeDriver
        run: |
          # Get Chrome version
          CHROME_VERSION=$(google-chrome --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | cut -d. -f1)
          echo "Chrome version: $CHROME_VERSION"
          
          # Download matching ChromeDriver from Chrome for Testing
          CHROMEDRIVER_URL="https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VERSION}.0.6947.0/linux64/chromedriver-linux64.zip"
          
          # Try the exact version first, fallback to searching
          if ! curl -f -o /tmp/chromedriver.zip "$CHROMEDRIVER_URL" 2>/dev/null; then
            # Find the latest matching version
            CHROMEDRIVER_VERSION=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/latest-versions-per-milestone-with-downloads.json" | jq -r ".milestones.\"$CHROME_VERSION\".downloads.chromedriver[] | select(.platform==\"linux64\") | .url" | head -1)
            echo "Downloading ChromeDriver from: $CHROMEDRIVER_VERSION"
            curl -L -o /tmp/chromedriver.zip "$CHROMEDRIVER_VERSION"
          fi
          
          # Extract and install
          unzip -o /tmp/chromedriver.zip -d /tmp/
          sudo mv /tmp/chromedriver-linux64/chromedriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

      - name: Run E2E tests
        run: npm run e2e