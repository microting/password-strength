name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build library
        run: npm run build:lib

      - name: Build demo app
        run: npx ng build

      - name: Update webdriver with Chrome for Testing
        run: npx webdriver-manager update --versions.chrome=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+') --gecko=false

      - name: Run E2E tests
        run: npm run e2e