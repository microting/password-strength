name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build library
        run: npm run build:lib

      - name: Build demo app
        run: npx ng build

      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: npm start
          wait-on: 'http://localhost:4510'
          wait-on-timeout: 120
          browser: chrome
          headed: false

      - name: Upload built library
        uses: actions/upload-artifact@v4
        with:
          name: built-library
          path: dist/microting/password-strength
          retention-days: 1

  publish-npm:
    needs: test-and-build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Download built library
        uses: actions/download-artifact@v4.1.3
        with:
          name: built-library
          path: dist/microting/password-strength

      - name: Verify version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=$(node -p "require('./dist/microting/password-strength/package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PACKAGE_VERSION"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Error: Tag version (v$TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi
          echo "Version match confirmed: $PACKAGE_VERSION"

      - name: Publish to npm with provenance
        run: npm publish ./dist/microting/password-strength --access public --provenance
