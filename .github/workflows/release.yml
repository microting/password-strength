# Release workflow for @microting/password-strength
#
# CURRENT STATUS: Package exists on npm (v16.0.0), but OIDC needs configuration!
# 
# REQUIRED: Configure OIDC Trusted Publishing on npmjs.com
# 
# Setup steps to enable automated publishing:
# 1. Go to: https://www.npmjs.com/package/@microting/password-strength/access
# 2. Log in with an account that has admin/maintainer access (renesmadsen)
# 3. Scroll to "Publishing access" or "Trusted publishers" section
# 4. Click "Add trusted publisher" or "Add publishing provider"
# 5. Select "GitHub Actions" as the provider
# 6. Enter these exact values:
#    - Repository owner: microting
#    - Repository name: password-strength
#    - Workflow filename: .github/workflows/release.yml
#    - Environment name: (leave blank)
# 7. Click "Add" or "Save"
# 8. Once configured, push a new tag to test: git tag v20.0.0 && git push origin v20.0.0
#
# After OIDC configuration, this workflow will automatically publish to npm!
#
# See NPM_RELEASE_SETUP.md for detailed instructions with screenshots.

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Update npm to latest stable version for Node 22
        run: npm install -g npm@10.9.4

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build library
        run: npm run build:lib

      - name: Build demo app
        run: npx ng build

      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: npm start
          wait-on: 'http://localhost:4510'
          wait-on-timeout: 120
          browser: chrome
          headed: false

      - name: Upload built library
        uses: actions/upload-artifact@v4
        with:
          name: built-library
          path: dist/microting/password-strength
          retention-days: 1

  publish-npm:
    needs: test-and-build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm to latest stable version for Node 22
        run: npm install -g npm@10.9.4

      - name: Download built library
        uses: actions/download-artifact@v4.1.3
        with:
          name: built-library
          path: dist/microting/password-strength

      - name: Verify version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=$(node -p "require('./dist/microting/password-strength/package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PACKAGE_VERSION"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Error: Tag version (v$TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi
          echo "Version match confirmed: $PACKAGE_VERSION"

      - name: Publish to npm with provenance
        id: npm-publish
        continue-on-error: true
        run: npm publish ./dist/microting/password-strength --access public --provenance

      - name: Check if OIDC needs configuration
        if: steps.npm-publish.outcome == 'failure'
        run: |
          echo "::error::npm publish failed. This is likely because OIDC Trusted Publishing is not configured."
          echo "::error::"
          echo "::error::The package exists on npmjs.com, but OIDC authentication is not set up."
          echo "::error::"
          echo "::error::To fix this, configure OIDC Trusted Publishing on npmjs.com:"
          echo "::error::"
          echo "::error::1. Go to: https://www.npmjs.com/package/@microting/password-strength/access"
          echo "::error::2. Log in with an account that has admin access to the package"
          echo "::error::3. Scroll to 'Publishing access' or 'Trusted publishers' section"
          echo "::error::4. Click 'Add trusted publisher'"
          echo "::error::5. Select 'GitHub Actions' as the provider"
          echo "::error::6. Enter the following configuration:"
          echo "::error::   - Repository owner: microting"
          echo "::error::   - Repository name: password-strength"
          echo "::error::   - Workflow file: .github/workflows/release.yml"
          echo "::error::   - Environment: (leave blank)"
          echo "::error::7. Click 'Add' to save"
          echo "::error::"
          echo "::error::After configuration, re-run this workflow or push a new tag."
          echo "::error::"
          echo "::error::For detailed instructions, see: NPM_RELEASE_SETUP.md"
          exit 1
